<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cas pratique – Code de déontologie immobilier</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f4f0;
  color: #1a1a18;
  min-height: 100vh;
  padding: 2rem 1rem;
}
.wrap { max-width: 680px; margin: 0 auto; }
h1 {
  font-size: 20px;
  font-weight: 500;
  color: #01438F;
  margin-bottom: 0.25rem;
}
.subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 1.5rem;
}
.progress-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.progress-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #d0cec8;
  transition: background 0.2s;
}
.progress-dot.done { background: #52AE32; }
.progress-dot.active { background: #01438F; }
.scenario-card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e0ddd6;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
}
.scenario-badge {
  display: inline-block;
  background: #EAF3DE;
  color: #27500A;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 1rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.avatar-row { display: flex; gap: 12px; align-items: center; margin-bottom: 1rem; }
.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.avatar.agent { background: #EAF3DE; color: #27500A; }
.avatar.client { background: #E6F1FB; color: #0C447C; }
.avatar.syndicat { background: #EEEDFE; color: #3C3489; }
.avatar.marchand { background: #FAEEDA; color: #633806; }
.avatar-name { font-size: 14px; font-weight: 600; color: #1a1a18; }
.avatar-desc { font-size: 12px; color: #888; }
.scene-text { font-size: 15px; line-height: 1.7; color: #2c2c2a; }
.question-section { margin-bottom: 1.25rem; }
.question-label {
  font-size: 11px; font-weight: 600; color: #888;
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}
.question-text {
  font-size: 15px; font-weight: 600; color: #1a1a18;
  line-height: 1.6; margin-bottom: 1rem;
}
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice-btn {
  background: #fff;
  border: 1px solid #d0cec8;
  border-radius: 8px;
  padding: 0.85rem 1rem;
  font-size: 14px;
  color: #1a1a18;
  text-align: left;
  cursor: pointer;
  line-height: 1.55;
  transition: background 0.12s, border-color 0.12s;
}
.choice-btn:hover { background: #f5f4f0; border-color: #a0a099; }
.choice-btn.correct { background: #EAF3DE; border-color: #52AE32; color: #173404; }
.choice-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
.choice-btn:disabled { pointer-events: none; opacity: 0.5; }
.feedback {
  display: none;
  border-left: 3px solid #52AE32;
  background: #f5f4f0;
  border-radius: 0 8px 8px 0;
  padding: 1rem 1.1rem;
  margin-top: 1rem;
  font-size: 14px;
  line-height: 1.65;
  color: #2c2c2a;
}
.feedback.show { display: block; }
.feedback.wrong-fb { border-left-color: #E24B4A; }
.feedback strong { font-weight: 600; }
.ref {
  font-size: 12px; color: #888;
  margin-top: 0.5rem; font-style: italic;
}
.nav-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 1.25rem;
}
.q-counter { font-size: 13px; color: #888; }
.next-btn {
  display: none;
  background: #01438F;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.6rem 1.25rem;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
}
.next-btn.show { display: block; }
.next-btn:hover { background: #143466; }
.score-card {
  display: none;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e0ddd6;
  padding: 2.5rem 2rem;
  text-align: center;
}
.score-card.show { display: block; }
.score-big { font-size: 56px; font-weight: 700; color: #01438F; margin: 0.5rem 0; }
.score-sub { font-size: 15px; color: #555; margin-bottom: 1.75rem; line-height: 1.6; }
.restart-btn {
  background: #fff;
  border: 1px solid #d0cec8;
  border-radius: 8px;
  padding: 0.65rem 1.5rem;
  font-size: 14px;
  color: #1a1a18;
  cursor: pointer;
  font-weight: 500;
}
.restart-btn:hover { background: #f5f4f0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Code de déontologie — Champ d'application</h1>
  <p class="subtitle">3 scénarios pour identifier qui est concerné et quelles activités sont visées</p>

  <div class="progress-row" id="progress-row"></div>

  <div id="quiz-area">
    <div class="scenario-card" id="scene-card"></div>
    <div class="scenario-card" id="question-card">
      <div class="question-section">
        <div class="question-label">À vous de jouer</div>
        <div class="question-text" id="q-text"></div>
        <div class="choices" id="choices"></div>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="nav-row">
        <span class="q-counter" id="q-counter"></span>
        <button class="next-btn" id="next-btn">Scénario suivant →</button>
      </div>
    </div>
  </div>

  <div class="score-card" id="score-card">
    <div class="question-label">Votre résultat</div>
    <div class="score-big" id="score-val">0/4</div>
    <div class="score-sub" id="score-msg"></div>
    <button class="restart-btn" onclick="restart()">↺ Recommencer</button>
  </div>
</div>

<script>
const scenarios = [
  {
    badge: "Scénario 1 — Qui est concerné ?",
    avatarClass: "agent",
    avatarInitials: "SR",
    avatarName: "Sofia Renard",
    avatarDesc: "Négociatrice indépendante, réseau immobilier",
    scene: "Sofia est négociatrice au sein d'un réseau national. Elle réalise des ventes d'appartements pour ses clients. Son directeur lui demande si elle est soumise au code de déontologie. Sofia hésite : elle n'est pas titulaire d'une carte T en son nom propre — elle travaille sous la carte professionnelle du réseau.",
    question: "Sofia est-elle soumise au code de déontologie des professions immobilières ?",
    choices: [
      { text: "Non, seuls les titulaires de la carte T à titre personnel sont concernés.", correct: false },
      { text: "Oui, car elle exerce à titre habituel une activité soumise à la loi Hoguet, même sous la carte du réseau.", correct: true },
      { text: "Oui, mais uniquement si elle traite des biens de plus de 300 000 €.", correct: false },
      { text: "Non, le code ne s'applique qu'aux agences physiques avec vitrine.", correct: false }
    ],
    feedbackOk: "Bonne réponse ! Le code s'applique à toutes les personnes exerçant à titre habituel une activité mentionnée à l'article 1er de la loi du 2 janvier 1970 — qu'elles détiennent leur propre carte ou qu'elles interviennent sous celle d'un titulaire. Sofia est donc pleinement concernée.",
    feedbackKo: "Pas tout à fait. Le code vise toutes les personnes exerçant à titre habituel ces activités, pas uniquement les titulaires de la carte T. Sofia, comme négociatrice sous la carte du réseau, est bien soumise à la déontologie."
  },
  {
    badge: "Scénario 2 — Quelle activité ?",
    avatarClass: "syndicat",
    avatarInitials: "PM",
    avatarName: "Pierre Maurel",
    avatarDesc: "Gestionnaire de copropriété",
    scene: "Pierre gère une résidence de 48 lots pour le compte d'une agence immobilière. Il s'occupe des assemblées générales, du budget, des travaux, des prestataires. Un copropriétaire lui dit que son métier n'a rien à voir avec les « vrais » agents immobiliers et qu'il n'est pas soumis aux mêmes règles déontologiques.",
    question: "L'activité de syndic de copropriété exercée par Pierre est-elle visée par le code de déontologie ?",
    choices: [
      { text: "Non, le syndic relève uniquement de la loi du 10 juillet 1965 sur la copropriété.", correct: false },
      { text: "Oui, mais seulement s'il gère plus de 50 lots.", correct: false },
      { text: "Oui, l'activité de syndic de copropriété est explicitement listée dans le code au titre des activités réglementées.", correct: true },
      { text: "Non, seule l'activité de vente immobilière est couverte par le code.", correct: false }
    ],
    feedbackOk: "Exact ! L'activité de syndic de copropriété (9° de l'article 1er de la loi Hoguet) est bien listée dans le code de déontologie — sans condition de taille de la copropriété. Pierre y est soumis de plein droit, au même titre qu'un agent immobilier.",
    feedbackKo: "Ce n'est pas la bonne réponse. L'activité de syndic de copropriété est expressément mentionnée dans le code de déontologie, sans aucun seuil de lots. Pierre y est soumis de plein droit."
  },
  {
    badge: "Scénario 4 — Marchand de listes",
    avatarClass: "marchand",
    avatarInitials: "TL",
    avatarName: "Thomas Lefèvre",
    avatarDesc: "Éditeur d'un fichier d'offres locatives en ligne",
    scene: "Thomas vend en ligne des fichiers contenant des offres de location de terrains agricoles (immeubles non bâtis) à des investisseurs. Il se considère comme un simple éditeur de données et pense échapper au champ de la loi Hoguet, car il ne « vend » pas de biens immobiliers à proprement parler.",
    question: "Thomas est-il soumis au code de déontologie en tant que marchand de listes ?",
    choices: [
      { text: "Non, il édite des données, ce n'est pas de l'intermédiation immobilière.", correct: false },
      { text: "Oui, la vente de fichiers contenant des offres de location d'immeubles non bâtis entre dans la définition légale du marchand de listes.", correct: true },
      { text: "Non, la loi Hoguet ne s'applique qu'aux immeubles bâtis.", correct: false },
      { text: "Oui, mais seulement s'il diffuse ses listes via la presse écrite.", correct: false }
    ],
    feedbackOk: "Parfait ! Le marchand de listes est celui qui vend des listes ou fichiers contenant des offres de location ou vente d'immeubles bâtis ou non bâtis. Thomas est donc bien soumis au code. À noter : la diffusion par voie de presse est justement l'exception exclue du champ — pas les fichiers vendus directement.",
    feedbackKo: "Pas tout à fait. La définition du marchand de listes inclut explicitement les offres portant sur des immeubles non bâtis. C'est la diffusion par voie de presse qui est exclue du champ de la loi, et non l'inverse."
  }
];

let current = 0, score = 0, answered = false;

function buildProgress() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  scenarios.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'progress-dot' + (i < current ? ' done' : i === current ? ' active' : '');
    row.appendChild(d);
  });
}

function renderScene() {
  const s = scenarios[current];
  document.getElementById('scene-card').innerHTML = `
    <span class="scenario-badge">${s.badge}</span>
    <div class="avatar-row">
      <div class="avatar ${s.avatarClass}">${s.avatarInitials}</div>
      <div>
        <div class="avatar-name">${s.avatarName}</div>
        <div class="avatar-desc">${s.avatarDesc}</div>
      </div>
    </div>
    <p class="scene-text">${s.scene}</p>
  `;
  document.getElementById('q-text').textContent = s.question;
  document.getElementById('q-counter').textContent = `Question ${current + 1} / ${scenarios.length}`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  s.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('next-btn').className = 'next-btn';
  answered = false;
  buildProgress();
  updateNextBtn();
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const s = scenarios[current];
  const btns = document.querySelectorAll('.choice-btn');
  const isCorrect = s.choices[idx].correct;
  if (isCorrect) score++;

  btns.forEach((btn, i) => {
    if (s.choices[i].correct) btn.classList.add('correct');
    else btn.disabled = true;
  });
  if (!isCorrect) btns[idx].classList.add('wrong');

  const fb = document.getElementById('feedback');
  fb.className = 'feedback show' + (isCorrect ? '' : ' wrong-fb');
  fb.innerHTML = (isCorrect
    ? '<strong>✓ Bonne réponse.</strong> '
    : '<strong>✗ Pas cette fois.</strong> ')
    + (isCorrect ? s.feedbackOk : s.feedbackKo)
    + `<div class="ref">Référence : Code de déontologie des professions immobilières — champ d'application ; loi n° 70-9 du 2 janvier 1970 (loi Hoguet)</div>`;

  document.getElementById('next-btn').className = 'next-btn show';
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current < scenarios.length) {
    renderScene();
  } else {
    showScore();
  }
};

function updateNextBtn() {
  const btn = document.getElementById('next-btn');
  btn.textContent = current === scenarios.length - 1 ? 'Voir mes résultats →' : 'Scénario suivant →';
}

function showScore() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('progress-row').style.display = 'none';
  const sc = document.getElementById('score-card');
  sc.className = 'score-card show';
  document.getElementById('score-val').textContent = score + ' / ' + scenarios.length;
  const msgs = [
    "Reprenez les articles du code et les activités listées dans la loi Hoguet — ces bases sont indispensables.",
    "Une notion à consolider. Relisez le cas que vous avez manqué.",
    "Bien ! Deux situations bien maîtrisées sur trois.",
    "Excellent ! Maîtrise parfaite du champ d'application du code de déontologie."
  ];
  document.getElementById('score-msg').textContent = msgs[Math.min(score, 3)];
}

function restart() {
  current = 0; score = 0; answered = false;
  document.getElementById('quiz-area').style.display = '';
  document.getElementById('progress-row').style.display = '';
  document.getElementById('score-card').className = 'score-card';
  renderScene();
}

renderScene();
</script>
</body>
</html>
